<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Паола — ассистент</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Экран входа -->
<div id="login-screen" class="login-screen hidden">
  <form id="login-form" class="login-card">
    <div class="login-mark">P.</div>
    <h1>Паола</h1>
    <p class="login-sub">рутина + аналитика</p>
    <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password" required>
    <button type="submit">Войти</button>
    <p id="login-error" class="login-error hidden">Неверный пароль</p>
  </form>
</div>

<!-- Приложение -->
<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand"><span class="brand-mark">P.</span> Паола <span id="today-date" class="topbar-date"></span></div>
    <button id="logout-btn" class="ghost-btn" type="button">Выйти</button>
  </header>

  <main class="layout">

    <!-- ЛЕВАЯ КОЛОНКА: РУТИНА -->
    <section class="col routine">
      <div class="card">
        <div class="card-head">
          <h2>Сводка</h2>
          <div class="seg">
            <button class="seg-btn active" data-digest="morning" type="button">Утро</button>
            <button class="seg-btn" data-digest="evening" type="button">Вечер</button>
          </div>
        </div>
        <pre id="digest-text" class="digest">Загружаю…</pre>
      </div>

      <div class="card">
        <div class="card-head"><h2>Задачи</h2><button id="tasks-refresh" class="ghost-btn" type="button">Обновить</button></div>
        <div id="tasks-body">Загружаю…</div>
      </div>

      <div class="card">
        <div class="card-head"><h2>Привычки</h2><span id="habits-date" class="card-note"></span></div>
        <ul id="habits-list" class="habits"></ul>
        <p id="habits-empty" class="empty hidden"></p>
      </div>

      <div class="card">
        <div class="card-head"><h2>Напоминания</h2></div>
        <ul id="reminders-list" class="reminders"></ul>
        <p id="reminders-empty" class="empty hidden"></p>
        <form id="reminder-form" class="reminder-form">
          <input type="text" id="reminder-text" placeholder="О чём напомнить" required>
          <input type="datetime-local" id="reminder-when" required>
          <button type="submit">Создать</button>
        </form>
      </div>
    </section>

    <!-- ПРАВАЯ КОЛОНКА: АНАЛИТИКА -->
    <section class="col analytics">
      <div class="card chat-card">
        <div class="chat-shell">

          <aside class="chat-rail">
            <div class="rail-head">
              <span>Диалоги</span>
              <button id="new-chat-btn" class="ghost-btn" type="button" title="Новый чат">＋ чат</button>
            </div>
            <div id="rail-list" class="rail-list"></div>
            <button id="new-project-btn" class="rail-project-btn" type="button">＋ проект</button>
          </aside>

          <div class="chat-pane">
            <div class="chat-pane-head">
              <div>
                <div id="chat-title" class="chat-title">—</div>
                <div id="chat-mode" class="chat-mode"></div>
              </div>
              <button id="chat-delete" class="ghost-btn danger" type="button">Удалить чат</button>
            </div>
            <div id="chat-log" class="chat-log"></div>
            <form id="chat-form" class="chat-form">
              <textarea id="chat-input" rows="2" placeholder="Напиши…" required></textarea>
              <button type="submit" id="chat-send">➤</button>
            </form>
          </div>

        </div>
      </div>
    </section>

  </main>
</div>

<!-- Диалог: новый чат -->
<dialog id="dlg-chat">
  <form method="dialog" class="dlg-form" id="dlg-chat-form">
    <h3>Новый чат</h3>
    <label>Тип
      <select id="dlg-chat-mode"></select>
    </label>
    <label>Проект (необязательно)
      <select id="dlg-chat-project"><option value="">— без проекта —</option></select>
    </label>
    <label>Название (необязательно)
      <input type="text" id="dlg-chat-title" placeholder="Например: Ресерч рынка упаковки">
    </label>
    <div class="dlg-actions">
      <button value="cancel" class="ghost-btn" formnovalidate>Отмена</button>
      <button value="ok" id="dlg-chat-ok">Создать</button>
    </div>
  </form>
</dialog>

<!-- Диалог: новый проект -->
<dialog id="dlg-project">
  <form method="dialog" class="dlg-form" id="dlg-project-form">
    <h3>Новый проект</h3>
    <label>Название
      <input type="text" id="dlg-project-name" placeholder="Например: Клиент Rossi Srl" required>
    </label>
    <label>Контекст для Паолы (необязательно)
      <textarea id="dlg-project-desc" rows="3" placeholder="Чем занимается клиент, что анализируем, цель проекта…"></textarea>
    </label>
    <div class="dlg-actions">
      <button value="cancel" class="ghost-btn" formnovalidate>Отмена</button>
      <button value="ok" id="dlg-project-ok">Создать</button>
    </div>
  </form>
</dialog>

<script src="/static/app.js"></script>
</body>
</html>
